<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Portal Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #111827;
            color: #fff;
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: 600;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin-bottom: 8px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #2563eb;
            color: white;
        }

        /* Navbar */
        .topbar {
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }

        .search-box {
            border-radius: 20px;
            padding-left: 15px;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card h6 {
            color: #6b7280;
        }

        /* Table */
        .table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>🎓 College</h4>
            <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#"><i class="bi bi-person"></i> Students</a>
            <a href="#"><i class="bi bi-book"></i> Courses</a>
            <a href="#"><i class="bi bi-people"></i> Faculty</a>
            <a href="#"><i class="bi bi-calendar"></i> Timetable</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">

            <!-- Topbar -->
            <div class="topbar d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Dashboard</h5>

                <!-- Search -->
                <div class="d-flex">
                    <input type="text" class="form-control search-box me-2" placeholder="Search...">
                    <button class="btn btn-primary">Search</button>
                </div>
            </div>

            <div class="p-4">

                <!-- Cards -->
                <div class="row g-4">

                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>Total Students</h6>
                            <h3>1200</h3>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>Courses</h6>
                            <h3>25</h3>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>Faculty</h6>
                            <h3>80</h3>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm p-3">
                            <h6>Events</h6>
                            <h3>10</h3>
                        </div>
                    </div>

                </div>

                <!-- Table -->
                <div class="card shadow-sm p-3 mt-4">
                    <h5>Recent Students</h5>

                    <table class="table mt-3">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Course</th>
                                <th>Year</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Rahul Patil</td>
                                <td>BSc IT</td>
                                <td>3rd</td>
                                <td><span class="badge bg-success">Active</span></td>
                            </tr>
                            <tr>
                                <td>Priya Sharma</td>
                                <td>BCA</td>
                                <td>2nd</td>
                                <td><span class="badge bg-success">Active</span></td>
                            </tr>
                            <tr>
                                <td>Amit Joshi</td>
                                <td>MCA</td>
                                <td>1st</td>
                                <td><span class="badge bg-warning">Pending</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
