<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<div class="container">

<div class="form-box shadow-lg">

<h2 class="title"><i class="bi bi-person-plus-fill"></i> User Registration</h2>
<p class="subtitle">Fill details carefully</p>

<form id="regForm">

<div class="row">

<div class="col-md-6">
<label>First Name</label>
<input type="text" class="form-control" id="fname" required>
</div>

<div class="col-md-6">
<label>Last Name</label>
<input type="text" class="form-control" id="lname" required>
</div>

</div>

<br>

<label>Date of Birth</label>
<input type="date" class="form-control" id="dob" required>

<br>

<label>Gender</label><br>
<div class="gender-box">
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
</div>

<br>

<label>Mobile Number</label>
<input type="text" class="form-control" id="mobile" maxlength="10" required>

<br>

<label>Email</label>
<input type="email" class="form-control" id="email" required>

<br>

<button class="btn btn-glow w-100">
<i class="bi bi-check-circle"></i> Register
</button>

</form>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
