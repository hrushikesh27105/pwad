<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>
    🎓 Student Information Dashboard
</h1>

<div class="table-container">

    <!-- Left Table -->

    <div class="table-box">

        <h2>
            Result Status
        </h2>

        <table>

            <tr>
                <th>Student Name</th>
                <th>Result</th>
            </tr>

            <tr>
                <td>Rahul</td>
                <td class="pass">Pass</td>
            </tr>

            <tr>
                <td>Sneha</td>
                <td class="pass">Pass</td>
            </tr>

            <tr>
                <td>Amit</td>
                <td class="fail">Fail</td>
            </tr>

            <tr>
                <td>Priya</td>

            </tr>

        </table>

    </div>

    <!-- Right Table -->

    <div class="table-box">

        <h2>
            CGPA Details
        </h2>

        <table>

            <tr>
                <th>Student Name</th>
                <th>CGPA</th>

            <tr>
                <td>Sneha</td>

    </div>

</div>

</html>
