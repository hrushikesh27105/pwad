<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Real Estate Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#e0f2fe,#f0fdf4);
}

/* HEADER */
.header{
    background: linear-gradient(45deg,#0f172a,#0ea5e9);
    color:white;
    padding:20px;
    text-align:center;
    font-weight:bold;
}

/* PROPERTY CARD */
.property-card{
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.property-card:hover{
    transform:scale(1.03);
}

.property-card img{
    height:220px;
    object-fit:cover;
}

/* PRICE */
.price{
    color:#16a34a;
    font-weight:bold;
}

/* BUTTON */
.btn-contact{
    background:linear-gradient(45deg,#22c55e,#0ea5e9);
    color:white;
    border:none;
    border-radius:10px;
    padding:8px;
    width:100%;
}

/* FOOTER STYLE */
footer{
    text-align:center;
    padding:15px;
    margin-top:30px;
    background:#0f172a;
    color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
🏡 Real Estate Portal - Find Your Dream Home
</div>

<!-- CONTENT -->
<div class="container mt-5">

<div class="row g-4">

<!-- PROPERTY 1 -->
<div class="col-md-4">
<div class="card property-card shadow">

<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994" class="w-100">

<div class="card-body">
<h5>Luxury Villa</h5>
<p>📍 Pune, Maharashtra</p>
<p class="price">₹ 1.5 Crore</p>

<button class="btn-contact" onclick="contact('Luxury Villa')">
Contact Us
</button>
</div>

</div>
</div>

<!-- PROPERTY 2 -->
<div class="col-md-4">
<div class="card property-card shadow">

<img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be" class="w-100">

<div class="card-body">
<h5>Modern Apartment</h5>
<p>📍 Mumbai, Maharashtra</p>
<p class="price">₹ 85 Lakh</p>

<button class="btn-contact" onclick="contact('Modern Apartment')">
Contact Us
</button>
</div>

</div>
</div>

<!-- PROPERTY 3 -->
<div class="col-md-4">
<div class="card property-card shadow">

<img src="https://images.unsplash.com/photo-1501183638710-841dd1904471" class="w-100">

<div class="card-body">
<h5>Beach House</h5>
<p>📍 Goa</p>
<p class="price">₹ 2.2 Crore</p>

<button class="btn-contact" onclick="contact('Beach House')">
Contact Us
</button>
</div>

</div>
</div>

</div>
</div>

<!-- FOOTER -->
<footer>
© 2026 Real Estate Portal | All Rights Reserved
</footer>

<!-- JS -->
<script>
function contact(property){
alert("You selected: " + property + "\nOur agent will contact you soon.");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
