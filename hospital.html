<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hospital Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#e0f2fe,#f0fdf4);
}

/* HEADER */
.header{
    background:linear-gradient(45deg,#0f766e,#0ea5e9);
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

/* CARD */
.card{
    border:none;
    border-radius:20px;
    padding:25px;
    margin-top:30px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
    background:white;
}

/* BUTTON */
.btn-custom{
    background:linear-gradient(45deg,#0ea5e9,#22c55e);
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.btn-custom:hover{
    transform:scale(1.03);
}

/* COUNTER */
.counter-box{
    text-align:center;
    padding:20px;
    background:white;
    border-radius:15px;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:600;
    margin-bottom:5px;
}

</style>
</head>

<body>

<div class="header">
    🏥 Hospital Management System - Patient Registration
</div>

<div class="container">

    <!-- COUNTER -->
    <div class="counter-box">
        Total Patients Registered:
        <span id="count">0</span>
    </div>

    <!-- FORM -->
    <div class="card">

        <h3 class="text-center text-primary mb-4">
            Patient Registration Form
        </h3>

        <form id="patientForm">

            <div class="row">

                <div class="col-md-6">
                    <label>Patient Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>

                <div class="col-md-6">
                    <label>Age</label>
                    <input type="number" class="form-control" id="age" required>
                </div>

            </div>

            <br>

            <div class="row">

                <div class="col-md-6">
                    <label>Gender</label>

                    <select class="form-control" id="gender">

                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>

                    </select>
                </div>

                <div class="col-md-6">
                    <label>Contact Number</label>

                    <input type="text"
                           class="form-control"
                           id="mobile"
                           maxlength="10"
                           required>
                </div>

            </div>

            <br>

            <label>Problem Description</label>

            <textarea class="form-control"
                      id="problem"
                      rows="4"></textarea>

            <br>

            <button class="btn btn-custom w-100">
                Register Patient
            </button>

        </form>

    </div>

</div>

<script>

// local storage array
let patients = JSON.parse(localStorage.getItem("patients")) || [];

// update counter on page load
document.getElementById("count").innerText = patients.length;

// form submit
document.getElementById("patientForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let name =
        document.getElementById("name").value;

    let age =
        document.getElementById("age").value;

    let gender =
        document.getElementById("gender").value;

    let mobile =
        document.getElementById("mobile").value;

    let problem =
        document.getElementById("problem").value;

    // validation
    if(mobile.length !== 10 || isNaN(mobile)){

        alert("Enter valid 10-digit mobile number");

        return;
    }

    // create patient object
    let patient = {
        name,
        age,
        gender,
        mobile,
        problem
    };

    // push into array
    patients.push(patient);

    // store in local storage
    localStorage.setItem(
        "patients",
        JSON.stringify(patients)
    );

    // update counter
    document.getElementById("count").innerText =
        patients.length;

    alert("Patient Registered Successfully!");

    // reset form
    document.getElementById("patientForm").reset();

});

</script>

</body>
</html>
